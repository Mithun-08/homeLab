networks:
  servarrnetwork:
    name: servarrnetwork

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    dns:
      - 1.1.1.1
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8180
    volumes:
      - ./qbittorrent:/config
      - /mnt/data/jellyfin:/data
    ports:
      - 8180:8180
      - 6881:6881
      - 6881:6881/udp
    networks:
      - servarrnetwork

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    dns:
      - 1.1.1.1
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - servarrnetwork

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    dns:
      - 1.1.1.1
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - TZ=${TZ}
    ports:
      - 8191:8191
    restart: unless-stopped
    networks:
      - servarrnetwork

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./sonarr:/config
      - /mnt/data/jellyfin:/data
    ports:
      - 8989:8989
    networks:
      - servarrnetwork

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./radarr:/config
      - /mnt/data/jellyfin:/data
    ports:
      - 7878:7878
    networks:
      - servarrnetwork

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    init: true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - LOG_LEVEL=debug
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./seerr:/app/config
    ports:
      - 5055:5055
    networks:
      - servarrnetwork

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./bazarr:/config
      - /mnt/data/jellyfin:/data
    ports:
      - 6767:6767
    networks:
      - servarrnetwork

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    group_add:
      - "993"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - DOCKER_MODS=linuxserver/mods:jellyfin-opencl-intel
    volumes:
      - ./jellyfin:/config
      - /mnt/data/jellyfin:/data
    ports:
      - 8096:8096
    networks:
      - servarrnetwork

  dispatcharr-web:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr-web
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - 9191:9191
    volumes:
      - ./dispatcharr_data:/data
    depends_on:
      dispatcharr-db:
        condition: service_healthy
      dispatcharr-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DISPATCHARR_ENV=modular
      - POSTGRES_HOST=dispatcharr-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dispatcharr
      - POSTGRES_USER=dispatch
      - POSTGRES_PASSWORD=secret
      - REDIS_HOST=dispatcharr-redis
      - REDIS_PORT=6379
      - DISPATCHARR_LOG_LEVEL=info
      - TZ=${TZ}
    networks:
      - servarrnetwork

  dispatcharr-celery:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr-celery
    restart: unless-stopped
    depends_on:
      dispatcharr-db:
        condition: service_healthy
      dispatcharr-redis:
        condition: service_healthy
      dispatcharr-web:
        condition: service_started
    volumes:
      - ./dispatcharr_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    entrypoint: ["/app/docker/entrypoint.celery.sh"]
    environment:
      - DISPATCHARR_ENV=modular
      - DISPATCHARR_PORT=9191
      - POSTGRES_HOST=dispatcharr-db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=dispatcharr
      - POSTGRES_USER=dispatch
      - POSTGRES_PASSWORD=secret
      - REDIS_HOST=dispatcharr-redis
      - REDIS_PORT=6379
      - DISPATCHARR_LOG_LEVEL=info
      - DJANGO_SETTINGS_MODULE=dispatcharr.settings
      - PYTHONUNBUFFERED=1
      - TZ=${TZ}
    networks:
      - servarrnetwork

  dispatcharr-db:
    image: postgres:17
    container_name: dispatcharr-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dispatcharr
      - POSTGRES_USER=dispatch
      - POSTGRES_PASSWORD=secret
      - TZ=${TZ}
    volumes:
      - dispatcharr_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatcharr"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - servarrnetwork

  dispatcharr-redis:
    image: redis:latest
    container_name: dispatcharr-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - servarrnetwork

volumes:
  dispatcharr_postgres_data:
